<header class="navbar" role="banner">
  <nav class="navbar-inner" aria-label="Main navigation">
    <a href="/" class="navbar-brand" aria-label="Home">
      <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="12" fill="var(--color-accent)" opacity="0.15"/>
        <path d="M24 12C17.373 12 12 17.373 12 24s5.373 12 12 12 12-5.373 12-12S30.627 12 24 12zm0 3.6c2.07 0 3.96.74 5.42 1.97l-2.23 2.14A6.94 6.94 0 0024 18.6a6.94 6.94 0 00-6.19 3.11l-2.23-2.14A11.94 11.94 0 0124 15.6zM15.6 24c0-1.22.28-2.38.78-3.42l2.23 2.14A6.96 6.96 0 0017.1 24c0 1.15.35 2.22.95 3.11l-2.23 2.14A11.9 11.9 0 0115.6 24zm4.44 6.4a6.94 6.94 0 006.19 3.11c1.54 0 2.93-.6 3.98-1.58l-2.1-2.01a6.92 6.92 0 01-1.88.84 6.94 6.94 0 01-6.19-3.11l-2.23 2.14c1.18 1.43 2.85 2.37 4.23 2.71zM24 30.6c-2.07 0-3.96-.74-5.42-1.97l2.23-2.14c.82.69 1.85 1.11 2.99 1.11.88 0 1.7-.27 2.37-.74l2.23 2.14A11.94 11.94 0 0124 30.6zm8.4-5.4l-2.23-2.14a6.96 6.96 0 00.95-3.11c0-1.15-.35-2.22-.95-3.11l2.23-2.14a11.9 11.9 0 01.87 5.25c0 1.84-.58 3.54-1.56 4.95l-1.31.3z" fill="var(--color-accent)"/>
      </svg>
      <span class="navbar-brand-text">{{ project_name }}</span>
    </a>

    <div class="navbar-actions">
      <button
        type="button"
        class="theme-toggle"
        data-theme-toggle
        aria-label="Switch to light theme"
        aria-pressed="false"
      >
        <span class="theme-icon" data-theme-icon aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </span>
        <span class="theme-label" data-theme-label>Light</span>
      </button>

      {% if user %}
      <a href="/dashboard" class="btn btn-ghost btn-sm">Dashboard</a>
      <a href="/auth/logout" class="btn btn-primary btn-sm">Sign Out</a>
      {% else %}
      <a href="/login" class="btn btn-primary btn-sm">Sign In</a>
      {% endif %}
    </div>
  </nav>
</header>
